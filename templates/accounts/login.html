{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="wrap" style="max-width:420px;">
    <h1 class="section-title">Вход</h1>
    <p style="color:var(--text-muted);margin-top:0;">Нет аккаунта? <a href="{% url 'tours:register' %}">Регистрация</a></p>
    <form method="post" class="form-stack">
      {% csrf_token %}
      {% if form.non_field_errors %}
      <div class="form-error">{{ form.non_field_errors }}</div>
      {% endif %}
      {% for field in form %}
      <label class="field-label">{{ field.label }}{{ field }}</label>
      {{ field.errors }}
      {% endfor %}
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Войти</button>
    </form>
  </div>
</section>
{% endblock %}
