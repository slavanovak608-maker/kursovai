{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="wrap" style="max-width:480px;">
    <h1 class="section-title">Регистрация</h1>
    <p style="color:var(--text-muted);margin-top:0;">Уже есть аккаунт? <a href="{% url 'tours:login' %}">Войти</a></p>
    <form method="post" class="form-stack">
      {% csrf_token %}
      {% for field in form %}
      <label class="field-label">{{ field.label }}{{ field }}</label>
      {% if field.help_text %}<small class="help">{{ field.help_text }}</small>{% endif %}
      {{ field.errors }}
      {% endfor %}
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.75rem;">Создать аккаунт</button>
    </form>
  </div>
</section>
{% endblock %}
